<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RabbitFarm — Créer un compte</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>
        body {
            background-color: #F5EFE6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 0;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(59,42,26,0.12);
            padding: 40px 36px;
            width: 100%;
            max-width: 480px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-logo .icon { font-size: 2.5rem; }
        .auth-logo h1 {
            font-family: Georgia, serif;
            color: #3B2A1A;
            font-size: 1.5rem;
            margin: 6px 0 2px;
        }
        .auth-logo p { color: #8C7B6B; font-size: 0.88rem; }
        .btn-auth {
            background-color: #7A9E7E;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            font-size: 1rem;
            transition: background 0.15s;
        }
        .btn-auth:hover { background-color: #6a8e6e; color: white; }
        .form-control:focus {
            border-color: #C8A96E;
            box-shadow: 0 0 0 0.2rem rgba(200,169,110,0.25);
        }
        .input-group-text {
            background: #F5EFE6;
            border-color: #dee2e6;
            color: #8C7B6B;
        }
        .section-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8C7B6B;
            margin-bottom: 12px;
        }
        .strength-bar { height: 4px; border-radius: 4px; transition: all 0.3s; }
    </style>
</head>
<body>

<div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
        <div class="icon">🐇</div>
        <h1>Créer un compte</h1>
        <p>RabbitFarm — Gestion de ferme</p>
    </div>

    <!-- Alertes -->
    <div th:if="${erreur}" class="alert alert-danger py-2 px-3 mb-3 d-flex align-items-center gap-2">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${erreur}"></span>
    </div>
    <div th:if="${erreurMdp}" class="alert alert-warning py-2 px-3 mb-3 d-flex align-items-center gap-2">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${erreurMdp}"></span>
    </div>

    <!-- Formulaire -->
    <form th:action="@{/auth/register}" th:object="${registreDTO}" method="post">

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <!-- Nom & Prénom -->
        <div class="section-title">Informations personnelles</div>
        <div class="row g-3 mb-3">
            <div class="col-6">
                <label class="form-label fw-semibold small" style="color:#3B2A1A;">Prénom *</label>
                <input type="text" class="form-control" th:field="*{prenom}"
                       th:classappend="${#fields.hasErrors('prenom')} ? 'is-invalid' : ''"
                       placeholder="Jean"/>
                <div class="invalid-feedback" th:errors="*{prenom}"></div>
            </div>
            <div class="col-6">
                <label class="form-label fw-semibold small" style="color:#3B2A1A;">Nom *</label>
                <input type="text" class="form-control" th:field="*{nom}"
                       th:classappend="${#fields.hasErrors('nom')} ? 'is-invalid' : ''"
                       placeholder="Dupont"/>
                <div class="invalid-feedback" th:errors="*{nom}"></div>
            </div>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label fw-semibold small" style="color:#3B2A1A;">Adresse email *</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" class="form-control" th:field="*{email}"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                       placeholder="votre@email.com"/>
                <div class="invalid-feedback" th:errors="*{email}"></div>
            </div>
        </div>

        <!-- Mot de passe -->
        <div class="section-title mt-3">Sécurité</div>
        <div class="mb-3">
            <label class="form-label fw-semibold small" style="color:#3B2A1A;">Mot de passe *</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" class="form-control" th:field="*{motDePasse}"
                       th:classappend="${#fields.hasErrors('motDePasse')} ? 'is-invalid' : ''"
                       id="mdp1" placeholder="Min. 6 caractères"
                       oninput="checkStrength(this.value)"/>
                <button type="button" class="btn btn-outline-secondary"
                        onclick="toggleMdp('mdp1','icon1')">
                    <i class="bi bi-eye" id="icon1"></i>
                </button>
                <div class="invalid-feedback" th:errors="*{motDePasse}"></div>
            </div>
            <!-- Barre de force -->
            <div class="mt-2">
                <div class="d-flex gap-1">
                    <div class="strength-bar flex-fill" id="bar1" style="background:#E8DDD0;"></div>
                    <div class="strength-bar flex-fill" id="bar2" style="background:#E8DDD0;"></div>
                    <div class="strength-bar flex-fill" id="bar3" style="background:#E8DDD0;"></div>
                </div>
                <small id="strengthText" class="text-muted"></small>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label fw-semibold small" style="color:#3B2A1A;">Confirmer le mot de passe *</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                <input type="password" class="form-control" th:field="*{confirmerMotDePasse}"
                       th:classappend="${#fields.hasErrors('confirmerMotDePasse')} ? 'is-invalid' : ''"
                       id="mdp2" placeholder="Répétez le mot de passe"
                       oninput="checkMatch()"/>
                <button type="button" class="btn btn-outline-secondary"
                        onclick="toggleMdp('mdp2','icon2')">
                    <i class="bi bi-eye" id="icon2"></i>
                </button>
                <div class="invalid-feedback" th:errors="*{confirmerMotDePasse}"></div>
            </div>
            <small id="matchText" class="mt-1 d-block"></small>
        </div>

        <button type="submit" class="btn-auth">
            <i class="bi bi-person-plus me-2"></i>Créer mon compte
        </button>

    </form>

    <hr style="border-color:#E8DDD0;" class="my-4"/>

    <p class="text-center mb-0" style="color:#8C7B6B; font-size:0.9rem;">
        Déjà un compte ?
        <a th:href="@{/auth/login}" style="color:#C8A96E; font-weight:600; text-decoration:none;">
            Se connecter
        </a>
    </p>

</div>

<script>
function toggleMdp(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
}

function checkStrength(val) {
    const bars = ['bar1','bar2','bar3'];
    const text = document.getElementById('strengthText');
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val) && /[0-9]/.test(val)) score++;

    const colors = ['#D94F3D','#F57C00','#7A9E7E'];
    const labels = ['Faible','Moyen','Fort'];
    bars.forEach((id, i) => {
        document.getElementById(id).style.background = i < score ? colors[score-1] : '#E8DDD0';
    });
    text.textContent = val.length > 0 ? labels[score-1] || '' : '';
    text.style.color = score > 0 ? colors[score-1] : '#8C7B6B';
}

function checkMatch() {
    const mdp1 = document.getElementById('mdp1').value;
    const mdp2 = document.getElementById('mdp2').value;
    const text = document.getElementById('matchText');
    if (mdp2.length === 0) { text.textContent = ''; return; }
    if (mdp1 === mdp2) {
        text.textContent = '✓ Les mots de passe correspondent';
        text.style.color = '#388E3C';
    } else {
        text.textContent = '✗ Les mots de passe ne correspondent pas';
        text.style.color = '#C62828';
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
