<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>RabbitFarm — Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>
    <style>
        body {
            background-color: #F5EFE6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(59,42,26,0.12);
            padding: 40px 36px;
            width: 100%;
            max-width: 420px;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-logo .icon { font-size: 3rem; }
        .auth-logo h1 {
            font-family: Georgia, serif;
            color: #3B2A1A;
            font-size: 1.6rem;
            margin: 6px 0 2px;
        }
        .auth-logo p { color: #8C7B6B; font-size: 0.88rem; }
        .btn-auth {
            background-color: #3B2A1A;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            width: 100%;
            font-size: 1rem;
            transition: background 0.15s;
        }
        .btn-auth:hover { background-color: #5C3D1E; color: white; }
        .divider { border-color: #E8DDD0; }
        .form-control:focus {
            border-color: #C8A96E;
            box-shadow: 0 0 0 0.2rem rgba(200,169,110,0.25);
        }
        .input-group-text {
            background: #F5EFE6;
            border-color: #dee2e6;
            color: #8C7B6B;
        }
    </style>
</head>
<body>

<div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
        <div class="icon">🐇</div>
        <h1>RabbitFarm</h1>
        <p>Gestion de ferme de lapins</p>
    </div>

    <!-- Alertes -->
    <div th:if="${erreur}" class="alert alert-danger py-2 px-3 mb-3 d-flex align-items-center gap-2">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span th:text="${erreur}"></span>
    </div>
    <div th:if="${info}" class="alert alert-info py-2 px-3 mb-3 d-flex align-items-center gap-2">
        <i class="bi bi-info-circle-fill"></i>
        <span th:text="${info}"></span>
    </div>
    <div th:if="${succes}" class="alert alert-success py-2 px-3 mb-3 d-flex align-items-center gap-2">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${succes}"></span>
    </div>

    <!-- Formulaire login -->
    <form th:action="@{/auth/login}" method="post">

        <!-- CSRF Token (Spring Security) -->
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="mb-3">
            <label class="form-label fw-semibold" style="color:#3B2A1A;">Adresse email</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="email" class="form-control"
                       placeholder="votre@email.com" required autofocus/>
            </div>
        </div>

        <div class="mb-4">
            <div class="d-flex justify-content-between">
                <label class="form-label fw-semibold" style="color:#3B2A1A;">Mot de passe</label>
            </div>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="motDePasse" id="mdp" class="form-control"
                       placeholder="••••••••" required/>
                <button type="button" class="btn btn-outline-secondary"
                        onclick="toggleMdp('mdp', 'iconMdp')">
                    <i class="bi bi-eye" id="iconMdp"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-auth">
            <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
        </button>

    </form>

    <hr class="divider my-4"/>

    <p class="text-center mb-0" style="color:#8C7B6B; font-size:0.9rem;">
        Pas encore de compte ?
        <a th:href="@{/auth/register}" style="color:#C8A96E; font-weight:600; text-decoration:none;">
            Créer un compte
        </a>
    </p>

</div>

<script>
function toggleMdp(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
