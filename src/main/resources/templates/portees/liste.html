<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Portées</title></head>
<body>
<section th:fragment="content" th:with="activePage='portees'">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="page-title mb-0">🍼 Suivi des portées</h1>
        <a th:href="@{/portees/nouveau}" class="btn btn-sage">
            <i class="bi bi-plus-lg me-1"></i> Nouvelle portée
        </a>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-4">
            <div class="stat-card" style="border-top-color:#388E3C;">
                <div class="stat-value" th:text="${totalNes}">0</div>
                <div class="stat-label">Total nés</div>
            </div>
        </div>
        <div class="col-4">
            <div class="stat-card" style="border-top-color:#D94F3D;">
                <div class="stat-value" th:text="${totalDeces}">0</div>
                <div class="stat-label">Total décès</div>
            </div>
        </div>
        <div class="col-4">
            <div class="stat-card" style="border-top-color:#C8A96E;">
                <div class="stat-value" th:text="${nesduMois}">0</div>
                <div class="stat-label">Nés ce mois</div>
            </div>
        </div>
    </div>

    <div th:each="portee : ${portees}" class="portee-card">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <span class="fw-bold me-2" style="color:#C8A96E;" th:text="'#' + ${portee.id}"></span>
                <span class="fw-semibold" th:text="${portee.lapine?.nom != null ? portee.lapine?.nom : 'Mère inconnue'}"></span>
                <span class="text-muted ms-2 small">
                    — Mise bas le <span th:text="${#temporals.format(portee.dateMiseBas, 'dd/MM/yyyy')}"></span>
                </span>
            </div>
            <div class="d-flex gap-2 align-items-center">
                <span th:class="'badge px-2 py-1 badge-' + ${portee.statut.name().toLowerCase()}"
                      th:text="${portee.statut}"></span>
                <a th:href="@{/portees/{id}/modifier(id=${portee.id})}"
                   class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a>
                <form th:action="@{/portees/{id}/supprimer(id=${portee.id})}"
                      method="post" data-confirm="Supprimer cette portée ?">
                    <button class="btn btn-sm btn-outline-danger"><i class="bi bi-trash"></i></button>
                </form>
            </div>
        </div>

        <div class="row g-2">
            <div class="col-3">
                <div class="portee-mini-box" style="background:#E8F5E9;">
                    <div class="fw-bold fs-4" style="color:#388E3C;" th:text="${portee.nbNes}">0</div>
                    <div class="small" style="color:#388E3C;">Nés</div>
                </div>
            </div>
            <div class="col-3">
                <div class="portee-mini-box" style="background:#E3F2FD;">
                    <div class="fw-bold fs-4" style="color:#1565C0;" th:text="${portee.nbVivants}">0</div>
                    <div class="small" style="color:#1565C0;">Vivants</div>
                </div>
            </div>
            <div class="col-3">
                <div class="portee-mini-box" style="background:#FFEBEE;">
                    <div class="fw-bold fs-4" style="color:#C62828;" th:text="${portee.nbDeces}">0</div>
                    <div class="small" style="color:#C62828;">Décès</div>
                </div>
            </div>
            <div class="col-3">
                <div class="portee-mini-box" style="background:#FFF3E0;">
                    <div class="fw-bold" style="color:#E65100; font-size:0.9rem;"
                         th:text="${portee.dateSevrage != null ? #temporals.format(portee.dateSevrage, 'dd/MM/yyyy') : '—'}"></div>
                    <div class="small" style="color:#E65100;">Sevrage</div>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <div class="d-flex justify-content-between small mb-1">
                <span class="text-muted">Taux de survie</span>
                <span class="fw-bold"
                      th:text="${#numbers.formatDecimal(portee.tauxSurvie, 1, 1)} + '%'"></span>
            </div>
            <div class="progress progress-stock">
                <div class="progress-bar bg-success"
                     th:style="'width:' + ${portee.tauxSurvie} + '%'"></div>
            </div>
        </div>

        <div th:if="${portee.notes}" class="mt-2 small text-muted fst-italic"
             th:text="'📝 ' + ${portee.notes}"></div>
    </div>

    <div th:if="${#lists.isEmpty(portees)}" class="text-center text-muted py-5">
        <i class="bi bi-inbox fs-1 d-block mb-3"></i>
        Aucune portée enregistrée.
        <a th:href="@{/portees/nouveau}">Enregistrer la première</a>
    </div>

</section>
</body>
</html>
