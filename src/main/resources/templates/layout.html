<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title}">RabbitFarm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>

    <style>
        /* ===== VARIABLES ===== */
        :root {
            --sidebar-width: 250px;
        }

        /* ===== LAYOUT GLOBAL ===== */
        body {
            overflow-x: hidden;
        }

        #wrapper {
            display: flex;
            min-height: 100vh;
        }

        /* ===== SIDEBAR ===== */
        #sidebar-wrapper {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        /* ===== CONTENU PRINCIPAL ===== */
        #page-content-wrapper {
            flex: 1;
            min-width: 0; /* important pour éviter le débordement */
            overflow-x: hidden;
        }

        /* ===== OVERLAY MOBILE ===== */
        #sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }

        /* ===== RESPONSIVE MOBILE ===== */
        @media (max-width: 768px) {
            #sidebar-wrapper {
                position: fixed;
                top: 0; left: 0;
                height: 100%;
                transform: translateX(-100%);
            }

            #sidebar-wrapper.open {
                transform: translateX(0);
            }

            #sidebar-overlay.open {
                display: block;
            }

            /* Empêcher le contenu de déborder */
            #page-content-wrapper {
                width: 100%;
            }

            /* Réduire les paddings sur mobile */
            main.p-4 {
                padding: 1rem !important;
            }

            .px-4 {
                padding-left: 1rem !important;
                padding-right: 1rem !important;
            }

            /* Navbar mobile */
            .navbar {
                padding-left: 1rem !important;
                padding-right: 1rem !important;
            }

            /* Tables responsive */
            .table-responsive {
                font-size: 0.85rem;
            }

            /* Cards sur mobile */
            .card {
                margin-bottom: 1rem;
            }
        }

        /* ===== BOUTON DÉCONNEXION ===== */
        .btn-logout {
            background-color: transparent;
            color: #8B5A2B;
            border: 1px solid rgba(139, 90, 43, 0.3);
            padding: 6px 14px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
        }

        .btn-logout:hover {
            background-color: #FFF9F5;
            color: #5C4033;
            border-color: #5C4033;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<!-- Overlay pour fermer le sidebar sur mobile -->
<div id="sidebar-overlay"></div>

<div class="d-flex" id="wrapper">

    <!-- ===== SIDEBAR ===== -->
    <div class="sidebar bg-sidebar" id="sidebar-wrapper">
        <div class="sidebar-brand py-4 px-3 d-flex align-items-center gap-2">
            <span style="font-size:1.8rem;">🐇</span>
            <span class="brand-name">RabbitFarm</span>
        </div>

        <ul class="nav flex-column px-2 mt-2">
            <li class="nav-item">
                <a th:href="@{/dashboard}"
                   th:classappend="${activePage == 'dashboard'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-house-door me-2"></i> Tableau de bord
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/lapins}"
                   th:classappend="${activePage == 'lapins'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-heart me-2"></i> Reproducteurs
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/gestations}"
                   th:classappend="${activePage == 'gestations'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-heart-pulse me-2"></i> Gestations
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/portees}"
                   th:classappend="${activePage == 'portees'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-grid me-2"></i> Portées
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/engraissement}"
                   th:classappend="${activePage == 'Engraissement'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-box me-2"></i> Engraissement
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/cages}"
                   th:classappend="${activePage == 'cages'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-layout-split me-2"></i> Cages
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/stocks}"
                   th:classappend="${activePage == 'stocks'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-box-seam me-2"></i> Stocks
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/ventes}"
                   th:classappend="${activePage == 'ventes'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-currency-dollar me-2"></i> Ventes
                </a>
            </li>
        </ul>

        <div class="sidebar-footer px-3 py-3 mt-auto">
            <small class="text-muted">v1.0.0</small>
        </div>
    </div>

    <!-- ===== CONTENU PRINCIPAL ===== -->
    <div id="page-content-wrapper" class="w-100">

        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-4">
            <button class="btn btn-sm btn-outline-secondary me-3" id="sidebarToggle">
                <i class="bi bi-list"></i>
            </button>
            <span class="navbar-brand mb-0 fw-semibold text-muted" th:text="${title}">Page</span>
            <div class="ms-auto d-flex align-items-center gap-2">
                <a th:href="@{/stocks}" th:if="${nbAlertes != null and nbAlertes > 0}"
                   class="btn btn-sm btn-danger position-relative">
                    <i class="bi bi-bell-fill"></i>
                    <span class="badge bg-white text-danger ms-1" th:text="${nbAlertes}"></span>
                </a>

                <div class="rounded-circle bg-warning d-flex align-items-center justify-content-center"
                     style="width:36px;height:36px;font-weight:700;color:#3B2A1A;flex-shrink:0;">A</div>

                <form th:action="@{/auth/logout}" method="post" class="d-inline mb-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-logout">
                        <i class="bi bi-box-arrow-right me-1"></i>
                        <span class="d-none d-sm-inline">Déconnexion</span>
                    </button>
                </form>
            </div>
        </nav>

        <!-- Alertes -->
        <div class="px-4 pt-3" th:if="${succes}">
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${succes}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        </div>
        <div class="px-4 pt-3" th:if="${erreur}">
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span th:text="${erreur}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        </div>

        <!-- Contenu de la page -->
        <main class="p-4">
            <div th:replace="${content}">Contenu ici</div>
        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>

<script>
    // ===== Toggle sidebar =====
    const sidebarToggle = document.getElementById('sidebarToggle');
    const sidebarWrapper = document.getElementById('sidebar-wrapper');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    function openSidebar() {
        sidebarWrapper.classList.add('open');
        sidebarOverlay.classList.add('open');
    }

    function closeSidebar() {
        sidebarWrapper.classList.remove('open');
        sidebarOverlay.classList.remove('open');
    }

    sidebarToggle.addEventListener('click', function () {
        if (sidebarWrapper.classList.contains('open')) {
            closeSidebar();
        } else {
            openSidebar();
        }
    });

    // Fermer en cliquant sur l'overlay
    sidebarOverlay.addEventListener('click', closeSidebar);

    // Fermer le sidebar sur mobile après un clic sur un lien
    document.querySelectorAll('.sidebar-link').forEach(link => {
        link.addEventListener('click', function () {
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        });
    });
</script>
</body>
</html>
