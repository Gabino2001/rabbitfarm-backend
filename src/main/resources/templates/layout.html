<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:replace="${title}">RabbitFarm</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <link th:href="@{/css/style.css}" rel="stylesheet"/>

    <style>
        /* Styles personnalisés pour le bouton de déconnexion marron & beige */
        .btn-logout {
            background-color: transparent;
            color: #8B5A2B; /* Marron terre de sienne */
            border: 1px solid rgba(139, 90, 43, 0.3);
            padding: 6px 14px;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
        }

        .btn-logout:hover {
            background-color: #FFF9F5; /* Fond crème très léger */
            color: #5C4033; /* Marron chocolat profond */
            border-color: #5C4033;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

<div class="d-flex" id="wrapper">

    <div class="sidebar bg-sidebar" id="sidebar-wrapper">
        <div class="sidebar-brand py-4 px-3 d-flex align-items-center gap-2">
            <span style="font-size:1.8rem;">🐇</span>
            <span class="brand-name">RabbitFarm</span>
        </div>

        <ul class="nav flex-column px-2 mt-2">
            <li class="nav-item">
                <a th:href="@{/dashboard}"
                   th:classappend="${activePage == 'dashboard'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-house-door me-2"></i> Tableau de bord
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/lapins}"
                   th:classappend="${activePage == 'lapins'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-heart me-2"></i>  Reproducteurs: "🐇",
                </a>
            </li>

            <li class="nav-item">
                <a th:href="@{/gestations}"
                   th:classappend="${activePage == 'gestations'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-heart-pulse me-2"></i> Gestations
                </a>
            </li>

            <li class="nav-item">
                <a th:href="@{/portees}"
                   th:classappend="${activePage == 'portees'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-grid me-2"></i>  Portées: "🍼",
                </a>
            </li>

            <li class="nav-item">
                <a th:href="@{/engraissement}"
                   th:classappend="${activePage == 'Engraissement'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-box me-2"></i> Engraissement
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/cages}"
                   th:classappend="${activePage == 'cages'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-layout-split me-2"></i>  Cages: "🏚️",
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/stocks}"
                   th:classappend="${activePage == 'stocks'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-box-seam me-2"></i>   Stocks: "🌾",
                </a>
            </li>
            <li class="nav-item">
                <a th:href="@{/ventes}"
                   th:classappend="${activePage == 'ventes'} ? 'active' : ''"
                   class="nav-link sidebar-link">
                    <i class="bi bi-currency-dollar me-2"></i> Ventes: "💰",
                </a>
            </li>
        </ul>

        <div class="sidebar-footer px-3 py-3 mt-auto">
            <small class="text-muted">v1.0.0</small>
        </div>
    </div>

    <div id="page-content-wrapper" class="w-100">

        <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-4">
            <button class="btn btn-sm btn-outline-secondary me-3" id="sidebarToggle">
                <i class="bi bi-list"></i>
            </button>
            <span class="navbar-brand mb-0 fw-semibold text-muted" th:text="${title}">Page</span>
            <div class="ms-auto d-flex align-items-center gap-3">
                <a th:href="@{/stocks}" th:if="${nbAlertes != null and nbAlertes > 0}"
                   class="btn btn-sm btn-danger position-relative">
                    <i class="bi bi-bell-fill"></i>
                    <span class="badge bg-white text-danger ms-1" th:text="${nbAlertes}"></span>
                </a>

                <div class="rounded-circle bg-warning d-flex align-items-center justify-content-center"
                     style="width:36px;height:36px;font-weight:700;color:#3B2A1A;">A</div>

                <form th:action="@{/auth/logout}" method="post" class="d-inline mb-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                    <button type="submit" class="btn btn-logout">
                        <i class="bi bi-box-arrow-right me-1"></i> Déconnexion
                    </button>
                </form>
            </div>
        </nav>

        <div class="px-4 pt-3" th:if="${succes}">
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${succes}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        </div>
        <div class="px-4 pt-3" th:if="${erreur}">
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span th:text="${erreur}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        </div>


        <main class="p-4">
            <div th:replace="${content}">Contenu ici</div>
        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/app.js}"></script>
</body>
</html>
