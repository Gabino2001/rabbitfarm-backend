<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title th:text="${stock.id != null} ? 'Modifier stock' : 'Nouveau stock'">Stock</title></head>
<body>
<section th:fragment="content" th:with="activePage='stocks'">

    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/stocks}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left"></i>
        </a>
        <h1 class="page-title mb-0"
            th:text="${stock.id != null} ? '✏️ Modifier stock' : '➕ Nouveau stock'"></h1>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-rabbitfarm p-4">
                <form th:action="${stock.id != null} ? @{/stocks/{id}/modifier(id=${stock.id})} : @{/stocks/nouveau}"
                      th:object="${stock}" method="post">

                    <div class="form-section-title">Informations du stock</div>
                    <div class="row g-3">

                        <div class="col-12">
                            <label class="form-label">Aliment *</label>
                            <input type="text" class="form-control" th:field="*{aliment}"
                                   th:classappend="${#fields.hasErrors('aliment')} ? 'is-invalid' : ''"
                                   placeholder="Ex: Granulés croissance"/>
                            <div class="invalid-feedback" th:errors="*{aliment}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Quantité *</label>
                            <input type="number" step="0.1" min="0" class="form-control"
                                   th:field="*{quantite}"
                                   th:classappend="${#fields.hasErrors('quantite')} ? 'is-invalid' : ''"/>
                            <div class="invalid-feedback" th:errors="*{quantite}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Unité *</label>
                            <select class="form-select" th:field="*{unite}">
                                <option value="kg">kg</option>
                                <option value="sac">sac</option>
                                <option value="litre">litre</option>
                                <option value="g">g</option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Seuil d'alerte *</label>
                            <input type="number" step="0.1" min="0" class="form-control"
                                   th:field="*{seuilAlerte}"
                                   th:classappend="${#fields.hasErrors('seuilAlerte')} ? 'is-invalid' : ''"/>
                            <div class="form-text">Alerte déclenchée en dessous de ce seuil</div>
                            <div class="invalid-feedback" th:errors="*{seuilAlerte}"></div>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Fournisseur</label>
                            <input type="text" class="form-control" th:field="*{fournisseur}"
                                   placeholder="Nom du fournisseur"/>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Notes</label>
                            <textarea class="form-control" th:field="*{notes}" rows="2"
                                      placeholder="Observations..."></textarea>
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-end mt-4">
                        <a th:href="@{/stocks}" class="btn btn-outline-secondary">Annuler</a>
                        <button type="submit" class="btn btn-sage">
                            <i class="bi bi-check-lg me-1"></i>
                            <span th:text="${stock.id != null} ? 'Enregistrer' : 'Créer'"></span>
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>

</section>
</body>
</html>
